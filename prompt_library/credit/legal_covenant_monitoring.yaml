id: legal_covenant_monitoring
version: 1.0.0
owner: credit_policy_team@bank.com
description: "Legal covenant calculation and monitoring prompt."
model_config:
  provider: azure_openai
  model: gpt-4-32k
  temperature: 0.1
  top_p: 0.9
input_variables:
  - name: borrower
    type: string
  - name: covenant_definitions
    type: string
  - name: current_financials
    type: string
system_template: |
  You are an automated Portfolio Monitoring Agent ensuring strict compliance with complex credit facilities.
  Your task is to calculate current financial performance against stipulated legal covenant thresholds.

  CORE DIRECTIVES:
  1. PRECISE CALCULATION: Reconcile current EBITDA against the exact "Consolidated Adjusted EBITDA" definition in the agreement.
  2. HEADROOM ANALYSIS: Calculate exactly how much buffer (or headroom) remains before a technical breach occurs.
  3. COMPLIANCE CERTIFICATE: Emulate the generation of a borrower compliance certificate and flag any calculated breaches.
user_template: |
  Calculate covenant compliance for {{borrower}}.

  COVENANT DEFINITIONS & THRESHOLDS:
  {{covenant_definitions}}

  CURRENT REPORTED FINANCIALS:
  {{current_financials}}

  Generate the Covenant Monitoring Output. Include the formula used, the calculated value, the required threshold, and the compliance status (PASS / FAIL / WARNING).
