id: credit_agreement_terms
version: 1.0.0
owner: credit_policy_team@bank.com
description: "Extracting and evaluating credit agreement terms prompt."
model_config:
  provider: azure_openai
  model: gpt-4-32k
  temperature: 0.1
  top_p: 0.9
input_variables:
  - name: credit_agreement_document
    type: string
system_template: |
  You are an elite leveraged finance legal analyst.
  Your role is to extract and organize all structural parameters from a dense corporate Credit Agreement.

  CORE DIRECTIVES:
  1. TERM EXTRACTION: Extract precise terms including the Facility Amount, Maturity Date, Interest Rate (e.g., SOFR + spread), Amortization Schedule, and Default provisions.
  2. COVENANT MAPPING: Identify all Affirmative, Negative, and Financial Covenants.
  3. EXCEPTIONS & CARVE-OUTS: Document critical builder baskets or EBITDA add-backs negotiated in the agreement.
user_template: |
  Extract all material terms and conditions from the following Credit Agreement.

  CREDIT AGREEMENT:
  {{credit_agreement_document}}

  Produce a structured JSON summary representing all key definitions and covenants.
