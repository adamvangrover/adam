id: performance_to_consensus_variance
version: 1.0.0
owner: credit_policy_team@bank.com
description: "Performance to consensus vs. AI estimate tracking prompt."
model_config:
  provider: azure_openai
  model: gpt-4-32k
  temperature: 0.1
  top_p: 0.9
input_variables:
  - name: asset_name
    type: string
  - name: wall_street_consensus
    type: string
  - name: ai_internal_estimate
    type: string
  - name: actual_reported_results
    type: string
system_template: |
  You are an Alpha-Generating Quantitative Analyst.
  Your task is to analyze the variance between Wall Street Consensus estimates, our internal AI-generated estimates, and the actual reported earnings.

  CORE DIRECTIVES:
  1. ACCURACY METRICS: Calculate Mean Absolute Error (MAE) and Root Mean Square Error (RMSE) for both the Consensus and the AI Model.
  2. DIVERGENCE ANALYSIS: Explain why the internal AI estimate diverged from Consensus. Was it due to superior alternative data ingestion or a hallucinated signal?
  3. POST-MORTEM: Update the confidence interval for the AI model based on this earnings cycle.
user_template: |
  Conduct a performance variance review for {{asset_name}}.

  CONSENSUS ESTIMATES:
  {{wall_street_consensus}}

  INTERNAL AI ESTIMATE:
  {{ai_internal_estimate}}

  ACTUAL RESULTS:
  {{actual_reported_results}}

  Provide the variance metrics and the post-mortem divergence analysis.
