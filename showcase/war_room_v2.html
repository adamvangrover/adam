<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The War Room - ADAM-V-NEXT</title>
    <style>
        :root {
            --primary-color: #0ff;
            --secondary-color: #f0f;
            --bg-color: #050a0f;
            --panel-bg: rgba(10, 20, 30, 0.85);
            --text-color: #e0e0e0;
            --border-color: #333;
            --alert-color: #f00;
            --success-color: #0f0;
            --font-family: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-badge {
            font-size: 1rem;
            background: rgba(0, 255, 0, 0.1);
            color: var(--success-color);
            padding: 5px 15px;
            border: 1px solid var(--success-color);
            border-radius: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 80px); /* Adjust based on header */
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        .panel-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .panel-header span {
            margin-right: 10px;
            font-size: 1.5rem;
        }

        /* 1. Live Ticker Styles */
        .ticker-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .ticker-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1.1rem;
        }

        .ticker-up { color: var(--success-color); }
        .ticker-down { color: var(--alert-color); }

        /* 2. News Feed Styles */
        .news-feed {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }

        .news-item {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--primary-color);
        }

        .news-time {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .news-title {
            font-size: 1rem;
            line-height: 1.4;
        }

        .news-critical {
            border-left-color: var(--alert-color);
        }

        /* 3. Risk Radar Styles */
        .radar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            position: relative;
        }

        .radar-svg {
            width: 100%;
            height: 100%;
            max-width: 300px;
            max-height: 300px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }

        /* 4. System Health Styles */
        .health-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
            align-content: start;
        }

        .health-node {
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node-name {
            font-weight: bold;
            color: #aaa;
            font-size: 0.9rem;
        }

        .node-bar-container {
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }

        .node-bar {
            height: 100%;
            background: var(--primary-color);
            transition: width 0.5s ease;
        }

        .node-status {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        /* Responsive adjustments for extremely large/small screens */
        @media (max-width: 1200px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                height: auto;
                overflow-y: auto;
            }
            body { overflow-y: auto; height: auto; }
            .panel { min-height: 350px; }
        }
    </style>
</head>
<body>

    <h1>
        <span>The War Room <span style={{color: '#888', fontSize: '1rem'}}>// SYNTHESIZER V2</span></span>
        <div class="status-badge">SYSTEM OPTIMAL</div>
    </h1>

    <div class="grid-container">

        <!-- Quadrant 1: Live Ticker -->
        <div class="panel">
            <div class="panel-header"><span>⚡</span> Live Market Pulse</div>
            <ul class="ticker-list" id="tickerList">
                <!-- Populated by JS -->
            </ul>
        </div>

        <!-- Quadrant 2: News Feed -->
        <div class="panel">
            <div class="panel-header"><span>📰</span> Global Intelligence Feed</div>
            <div class="news-feed" id="newsFeed">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Quadrant 3: Risk Radar -->
        <div class="panel">
            <div class="panel-header"><span>🎯</span> Multidimensional Risk Radar</div>
            <div class="radar-container">
                <svg viewBox="-120 -120 240 240" class="radar-svg">
                    <!-- Concentric circles -->
                    <circle cx="0" cy="0" r="100" fill="none" stroke="#333" stroke-width="1" />
                    <circle cx="0" cy="0" r="75" fill="none" stroke="#333" stroke-width="1" />
                    <circle cx="0" cy="0" r="50" fill="none" stroke="#333" stroke-width="1" />
                    <circle cx="0" cy="0" r="25" fill="none" stroke="#333" stroke-width="1" />

                    <!-- Axes -->
                    <line x1="0" y1="-100" x2="0" y2="100" stroke="#444" stroke-width="1" />
                    <line x1="-100" y1="0" x2="100" y2="0" stroke="#444" stroke-width="1" />
                    <line x1="-70.7" y1="-70.7" x2="70.7" y2="70.7" stroke="#444" stroke-width="1" />
                    <line x1="-70.7" y1="70.7" x2="70.7" y2="-70.7" stroke="#444" stroke-width="1" />

                    <!-- Labels -->
                    <text x="0" y="-110" fill="#888" font-size="8" text-anchor="middle">Volatility</text>
                    <text x="110" y="0" fill="#888" font-size="8" text-anchor="start" alignment-baseline="middle">Credit</text>
                    <text x="0" y="115" fill="#888" font-size="8" text-anchor="middle">Liquidity</text>
                    <text x="-110" y="0" fill="#888" font-size="8" text-anchor="end" alignment-baseline="middle">Macro</text>

                    <text x="80" y="-80" fill="#888" font-size="8" text-anchor="middle">Geopolitics</text>
                    <text x="80" y="80" fill="#888" font-size="8" text-anchor="middle">Regulatory</text>
                    <text x="-80" y="80" fill="#888" font-size="8" text-anchor="middle">Contagion</text>
                    <text x="-80" y="-80" fill="#888" font-size="8" text-anchor="middle">Sentiment</text>

                    <!-- Radar Polygon -->
                    <polygon id="radarPolygon" points="" fill="rgba(0, 255, 255, 0.2)" stroke="var(--primary-color)" stroke-width="2" />
                </svg>
            </div>
        </div>

        <!-- Quadrant 4: System Health -->
        <div class="panel">
            <div class="panel-header"><span>🧠</span> Neural Swarm Telemetry</div>
            <div class="health-grid" id="healthGrid">
                <!-- Populated by JS -->
            </div>
        </div>

    </div>

    <script>
        // --- 1. Live Ticker Logic ---
        const tickers = [
            { symbol: 'SPX', price: 5120.50, change: 0.00, vol: 2.5 },
            { symbol: 'NDX', price: 18050.25, change: 0.00, vol: 5.0 },
            { symbol: 'VIX', price: 14.20, change: 0.00, vol: 1.2 },
            { symbol: 'US10Y', price: 4.25, change: 0.00, vol: 0.05 },
            { symbol: 'BTC', price: 65000, change: 0.00, vol: 150 },
            { symbol: 'OIL', price: 82.50, change: 0.00, vol: 0.8 },
            { symbol: 'GLD', price: 2150.80, change: 0.00, vol: 1.5 }
        ];

        function updateTickers() {
            const list = document.getElementById('tickerList');
            list.innerHTML = '';

            tickers.forEach(t => {
                // Simulate price movement
                const move = (Math.random() - 0.5) * t.vol;
                t.price += move;
                t.change = move;
                const pctChange = (t.change / t.price) * 100;

                const item = document.createElement('li');
                item.className = 'ticker-item';

                const colorClass = t.change >= 0 ? 'ticker-up' : 'ticker-down';
                const sign = t.change >= 0 ? '+' : '';

                item.innerHTML = `
                    <span style="font-weight: bold; width: 60px; display: inline-block;">${t.symbol}</span>
                    <span style="font-family: monospace;">${t.price.toFixed(2)}</span>
                    <span class="${colorClass}" style="width: 80px; text-align: right;">${sign}${pctChange.toFixed(2)}%</span>
                `;
                list.appendChild(item);
            });
        }

        // --- 2. News Feed Logic ---
        const newsItems = [
            { title: "Central Bank signals potential rate cut in Q3.", crit: false },
            { title: "Tech sector rally continues amidst AI chip shortage.", crit: false },
            { title: "Geopolitical tensions escalate in key transit corridor.", crit: true },
            { title: "Major sovereign debt downgrade rocks European markets.", crit: true },
            { title: "Retail sales data beats expectations.", crit: false },
            { title: "New regulatory framework proposed for digital assets.", crit: false }
        ];

        function addNews() {
            const feed = document.getElementById('newsFeed');
            const item = newsItems[Math.floor(Math.random() * newsItems.length)];
            const time = new Date().toLocaleTimeString();

            const div = document.createElement('div');
            div.className = `news-item ${item.crit ? 'news-critical' : ''}`;
            div.innerHTML = `
                <div class="news-time">${time} ${item.crit ? '<span style="color:#f00; font-weight:bold;">[CRITICAL]</span>' : ''}</div>
                <div class="news-title">${item.title}</div>
            `;

            feed.insertBefore(div, feed.firstChild);

            // Keep only latest 10
            if(feed.children.length > 10) {
                feed.removeChild(feed.lastChild);
            }
        }

        // --- 3. Risk Radar Logic ---
        // 8 axes corresponding to the labels above
        let radarValues = [50, 40, 60, 30, 70, 45, 20, 55]; // 0-100 scale

        function updateRadar() {
            // Jitter values
            radarValues = radarValues.map(v => {
                let nv = v + (Math.random() - 0.5) * 10;
                return Math.max(10, Math.min(100, nv));
            });

            const angles = [
                -Math.PI/2,        // Top
                -Math.PI/4,        // Top Right
                0,                 // Right
                Math.PI/4,         // Bottom Right
                Math.PI/2,         // Bottom
                3*Math.PI/4,       // Bottom Left
                Math.PI,           // Left
                -3*Math.PI/4       // Top Left
            ];

            let points = "";
            for(let i=0; i<8; i++) {
                const r = radarValues[i];
                const x = r * Math.cos(angles[i]);
                const y = r * Math.sin(angles[i]);
                points += `${x},${y} `;
            }

            const poly = document.getElementById('radarPolygon');
            poly.setAttribute('points', points.trim());

            // Change color based on overall risk (avg area approx)
            const avg = radarValues.reduce((a,b)=>a+b, 0) / 8;
            if(avg > 70) {
                poly.setAttribute('stroke', '#f00');
                poly.setAttribute('fill', 'rgba(255, 0, 0, 0.2)');
            } else if (avg > 50) {
                poly.setAttribute('stroke', '#ffa500');
                poly.setAttribute('fill', 'rgba(255, 165, 0, 0.2)');
            } else {
                poly.setAttribute('stroke', '#0ff');
                poly.setAttribute('fill', 'rgba(0, 255, 255, 0.2)');
            }
        }

        // --- 4. System Health Logic ---
        const nodes = [
            { id: 'n1', name: 'MetaOrchestrator', load: 45 },
            { id: 'n2', name: 'RiskEngine_v2', load: 80 },
            { id: 'n3', name: 'ConsensusEngine', load: 30 },
            { id: 'n4', name: 'BlindspotMonitor', load: 15 },
            { id: 'n5', name: 'MarketDataFeeds', load: 60 },
            { id: 'n6', name: 'GraphMemoryDB', load: 90 }
        ];

        function initHealth() {
            const grid = document.getElementById('healthGrid');
            grid.innerHTML = '';
            nodes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'health-node';
                div.innerHTML = `
                    <div class="node-name">${n.name}</div>
                    <div class="node-bar-container">
                        <div class="node-bar" id="bar-${n.id}" style="width: ${n.load}%"></div>
                    </div>
                    <div class="node-status">
                        <span>CPU / MEM</span>
                        <span id="val-${n.id}">${n.load}%</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function updateHealth() {
            nodes.forEach(n => {
                n.load += (Math.random() - 0.5) * 15;
                n.load = Math.max(5, Math.min(98, n.load));

                const bar = document.getElementById(`bar-${n.id}`);
                const val = document.getElementById(`val-${n.id}`);

                if(bar && val) {
                    bar.style.width = `${n.load}%`;
                    val.innerText = `${n.load.toFixed(0)}%`;

                    if(n.load > 85) {
                        bar.style.background = 'var(--alert-color)';
                        val.style.color = 'var(--alert-color)';
                    } else if (n.load > 60) {
                        bar.style.background = '#ffa500';
                        val.style.color = '#ffa500';
                    } else {
                        bar.style.background = 'var(--primary-color)';
                        val.style.color = 'var(--text-color)';
                    }
                }
            });
        }

        // --- Initialization and Loops ---
        window.onload = () => {
            initHealth();
            updateTickers();
            updateRadar();

            // Initial news
            for(let i=0; i<3; i++) addNews();

            // Set intervals
            setInterval(updateTickers, 1000);
            setInterval(updateRadar, 2000);
            setInterval(updateHealth, 3000);
            setInterval(addNews, 8000);
        };
    </script>
</body>
</html>
<!-- Protocol Verified: ADAM-V-NEXT -->
