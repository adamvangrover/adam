<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The War Room - ADAM V-NEXT</title>
    <style>
        :root {
            --bg-color: #050a0f;
            --panel-bg: rgba(10, 15, 25, 0.85);
            --border-color: #00f3ff;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent-green: #0f0;
            --accent-red: #f00;
            --accent-yellow: #ff0;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            height: 100vh;
            box-sizing: border-box;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-sans);
        }

        .header h1 {
            margin: 0;
            color: var(--border-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            font-size: 1.5rem;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--accent-green);
        }

        .header .status .indicator {
            width: 10px;
            height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 4-Quadrant Grid for 4k resolution */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 100px); /* Fill remaining height */
        }

        .quadrant {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .quadrant::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            opacity: 0.5;
        }

        .quadrant-title {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Quadrant 1: Live Ticker */
        .ticker-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .ticker-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1.1rem;
        }

        .ticker-symbol { color: #fff; font-weight: bold; }
        .ticker-price { font-family: var(--font-mono); }
        .ticker-change.up { color: var(--accent-green); }
        .ticker-change.down { color: var(--accent-red); }

        /* Quadrant 2: News Feed */
        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .news-item {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-left: 3px solid var(--border-color);
            border-radius: 0 4px 4px 0;
            transition: background 0.2s;
        }

        .news-item:hover {
            background: rgba(0, 243, 255, 0.1);
        }

        .news-time {
            font-size: 0.8rem;
            color: var(--border-color);
            margin-bottom: 5px;
        }

        .news-headline {
            font-size: 1rem;
            color: #fff;
            margin: 0 0 5px 0;
        }

        .news-impact {
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .impact-high { color: var(--accent-red); }
        .impact-medium { color: var(--accent-yellow); }
        .impact-low { color: var(--accent-green); }

        /* Quadrant 3: Risk Radar */
        .radar-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .radar-svg {
            width: 80%;
            height: 80%;
            max-width: 400px;
            max-height: 400px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.3));
        }

        /* Quadrant 4: System Health */
        .health-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
            align-content: start;
        }

        .health-card {
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .health-name {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .health-value {
            font-size: 1.5rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .health-bar-container {
            height: 4px;
            background: #222;
            width: 100%;
            border-radius: 2px;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            transition: width 0.5s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 243, 255, 0.6); }

    </style>
</head>
<body>

    <div class="header">
        <h1>ADAM-V-NEXT // The War Room</h1>
        <div class="status">
            <div class="indicator"></div>
            SYSTEM ONLINE // ALL AGENTS NOMINAL
        </div>
    </div>

    <div class="grid-container">

        <!-- Quadrant 1: Live Ticker -->
        <div class="quadrant">
            <h2 class="quadrant-title">
                Live Price Stream
                <span style="font-size: 0.7rem; color: var(--accent-green);">LIVE ⚡</span>
            </h2>
            <ul class="ticker-list" id="tickerList">
                <!-- Populated by JS -->
            </ul>
        </div>

        <!-- Quadrant 2: News Feed -->
        <div class="quadrant">
            <h2 class="quadrant-title">
                Global Intelligence Feed
                <span style="font-size: 0.7rem; color: var(--border-color);">FILTER: ALL</span>
            </h2>
            <div class="news-feed" id="newsFeed">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Quadrant 3: Risk Radar -->
        <div class="quadrant">
            <h2 class="quadrant-title">
                Systemic Risk Radar
                <span style="font-size: 0.7rem; color: var(--accent-yellow);">UPDATING</span>
            </h2>
            <div class="radar-container">
                <svg class="radar-svg" viewBox="0 0 100 100">
                    <!-- Background Webs -->
                    <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="rgba(0, 243, 255, 0.05)" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" fill="rgba(0, 243, 255, 0.05)" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <polygon points="50,35 65,42.5 65,57.5 50,65 35,57.5 35,42.5" fill="rgba(0, 243, 255, 0.05)" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>

                    <!-- Axes -->
                    <line x1="50" y1="50" x2="50" y2="5" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <line x1="50" y1="50" x2="95" y2="27.5" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <line x1="50" y1="50" x2="95" y2="72.5" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <line x1="50" y1="50" x2="50" y2="95" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <line x1="50" y1="50" x2="5" y2="72.5" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
                    <line x1="50" y1="50" x2="5" y2="27.5" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>

                    <!-- Data Polygon (Dynamic) -->
                    <polygon id="radarData" points="50,25 70,40 60,60 50,70 30,55 40,30" fill="rgba(255, 0, 0, 0.3)" stroke="rgba(255, 0, 0, 0.8)" stroke-width="1.5" style="transition: all 0.5s ease;"/>

                    <!-- Labels -->
                    <text x="50" y="3" fill="#888" font-size="3" text-anchor="middle">Geopolitics</text>
                    <text x="96" y="27.5" fill="#888" font-size="3" text-anchor="start">Liquidity</text>
                    <text x="96" y="72.5" fill="#888" font-size="3" text-anchor="start">Credit</text>
                    <text x="50" y="98" fill="#888" font-size="3" text-anchor="middle">Contagion</text>
                    <text x="4" y="72.5" fill="#888" font-size="3" text-anchor="end">Volatility</text>
                    <text x="4" y="27.5" fill="#888" font-size="3" text-anchor="end">Macro</text>
                </svg>
            </div>
        </div>

        <!-- Quadrant 4: System Health -->
        <div class="quadrant">
            <h2 class="quadrant-title">
                Core Subsystems
                <span style="font-size: 0.7rem; color: var(--text-muted);">MONITORING</span>
            </h2>
            <div class="health-grid" id="healthGrid">
                <!-- Populated by JS -->
            </div>
        </div>

    </div>

    <script>
        // --- 1. Live Ticker Logic ---
        const tickers = [
            { symbol: 'SPY', price: 512.45, baseVol: 0.5 },
            { symbol: 'QQQ', price: 445.12, baseVol: 0.8 },
            { symbol: 'IWM', price: 205.30, baseVol: 0.6 },
            { symbol: 'BTC', price: 68420.00, baseVol: 50.0 },
            { symbol: 'ETH', price: 3840.50, baseVol: 15.0 },
            { symbol: 'US10Y', price: 4.25, baseVol: 0.01 },
            { symbol: 'VIX', price: 14.20, baseVol: 0.3 }
        ];

        const tickerList = document.getElementById('tickerList');

        function initTickers() {
            tickerList.innerHTML = '';
            tickers.forEach(t => {
                const li = document.createElement('li');
                li.className = 'ticker-item';
                li.innerHTML = `
                    <span class="ticker-symbol">${t.symbol}</span>
                    <div>
                        <span class="ticker-price" id="price-${t.symbol}">$${t.price.toFixed(2)}</span>
                        <span class="ticker-change up" id="change-${t.symbol}">+0.00%</span>
                    </div>
                `;
                tickerList.appendChild(li);
            });
        }

        function updateTickers() {
            tickers.forEach(t => {
                // Random walk
                const change = (Math.random() - 0.5) * t.baseVol;
                t.price += change;
                const pctChange = (change / t.price) * 100;

                const priceEl = document.getElementById(`price-${t.symbol}`);
                const changeEl = document.getElementById(`change-${t.symbol}`);

                if(priceEl && changeEl) {
                    priceEl.textContent = t.symbol.includes('10Y') ? `${t.price.toFixed(3)}%` : `$${t.price.toFixed(2)}`;
                    changeEl.textContent = `${pctChange > 0 ? '+' : ''}${pctChange.toFixed(2)}%`;
                    changeEl.className = `ticker-change ${pctChange > 0 ? 'up' : 'down'}`;

                    // Flash effect
                    priceEl.style.color = pctChange > 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                    setTimeout(() => priceEl.style.color = '', 300);
                }
            });
        }

        // --- 2. News Feed Logic ---
        const newsItems = [
            { headline: "Fed signals potential rate cut in Q3", impact: "high", color: "var(--accent-green)" },
            { headline: "Tech sector earnings beat expectations", impact: "medium", color: "var(--accent-yellow)" },
            { headline: "Geopolitical tensions rise in Eastern Europe", impact: "high", color: "var(--accent-red)" },
            { headline: "Oil prices surge on supply concerns", impact: "medium", color: "var(--accent-red)" },
            { headline: "New AI regulations proposed by EU", impact: "low", color: "var(--border-color)" }
        ];

        const newsFeed = document.getElementById('newsFeed');

        function addNewsItem() {
            const item = newsItems[Math.floor(Math.random() * newsItems.length)];
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });

            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `
                <div class="news-time">[${time}] SYSTEM MSG</div>
                <h3 class="news-headline">${item.headline}</h3>
                <div class="news-impact impact-${item.impact}" style="color: ${item.color}">Impact: ${item.impact.toUpperCase()}</div>
            `;

            newsFeed.prepend(div);
            if (newsFeed.children.length > 10) {
                newsFeed.removeChild(newsFeed.lastChild);
            }
        }

        // --- 3. Risk Radar Logic ---
        const radarPolygon = document.getElementById('radarData');

        function updateRadar() {
            // Generate 6 random points radiating from center (50,50)
            const angles = [0, 60, 120, 180, 240, 300]; // in degrees
            // Top (0), TopRight(60), BotRight(120), Bot(180), BotLeft(240), TopLeft(300)

            let pointsStr = "";
            angles.forEach(angle => {
                // Random distance from center (10 to 45)
                const r = 10 + Math.random() * 35;
                const rad = (angle - 90) * Math.PI / 180; // -90 so 0 is top
                const x = 50 + r * Math.cos(rad);
                const y = 50 + r * Math.sin(rad);
                pointsStr += `${x},${y} `;
            });

            radarPolygon.setAttribute('points', pointsStr.trim());
        }

        // --- 4. System Health Logic ---
        const subsystems = [
            { name: "Risk Officer", load: 45, color: "var(--accent-green)" },
            { name: "Blindspot Scanner", load: 88, color: "var(--accent-yellow)" },
            { name: "Consensus Engine", load: 30, color: "var(--border-color)" },
            { name: "Network DB", load: 95, color: "var(--accent-red)" },
            { name: "Live Mock Engine", load: 60, color: "var(--accent-green)" },
            { name: "Meta-Orchestrator", load: 25, color: "var(--border-color)" }
        ];

        const healthGrid = document.getElementById('healthGrid');

        function initHealth() {
            healthGrid.innerHTML = '';
            subsystems.forEach((sub, i) => {
                const div = document.createElement('div');
                div.className = 'health-card';
                div.innerHTML = `
                    <div class="health-name">${sub.name}</div>
                    <div class="health-value">
                        <span id="health-val-${i}">${sub.load}%</span>
                        <span style="font-size: 0.8rem; color: ${sub.color}">ONLINE</span>
                    </div>
                    <div class="health-bar-container">
                        <div class="health-bar" id="health-bar-${i}" style="width: ${sub.load}%; background-color: ${sub.color}"></div>
                    </div>
                `;
                healthGrid.appendChild(div);
            });
        }

        function updateHealth() {
            subsystems.forEach((sub, i) => {
                // Jitter load
                sub.load = Math.max(5, Math.min(100, sub.load + (Math.random() - 0.5) * 10));

                // Determine color based on load
                if (sub.load > 90) sub.color = 'var(--accent-red)';
                else if (sub.load > 70) sub.color = 'var(--accent-yellow)';
                else sub.color = 'var(--accent-green)';

                const valEl = document.getElementById(`health-val-${i}`);
                const barEl = document.getElementById(`health-bar-${i}`);

                if(valEl && barEl) {
                    valEl.textContent = `${Math.round(sub.load)}%`;
                    barEl.style.width = `${sub.load}%`;
                    barEl.style.backgroundColor = sub.color;
                }
            });
        }

        // --- Initialization and Loops ---
        initTickers();
        initHealth();
        addNewsItem();
        updateRadar();

        setInterval(updateTickers, 1500);
        setInterval(addNewsItem, 5000);
        setInterval(updateRadar, 3000);
        setInterval(updateHealth, 2000);

    </script>
</body>
</html>
