<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM v24.2 :: MARKET MAYHEM ARCHIVE</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/nav.js" defer></script>
    <!-- Static Data Loader (for file:// protocol compatibility) -->
    <script src="js/market_mayhem_data_static.js"></script>
    <script src="js/market_mayhem_archive_v2.js" defer></script>

    <style>
        :root {
            --primary-color: #00f3ff;
            --secondary-color: #0aff60;
            --danger-color: #ff3333;
            --bg-color: #050b14;
            --panel-bg: rgba(5, 11, 20, 0.95);
            --border-color: #333;
            --text-primary: #e0e0e0;
            --text-muted: #888;
            --accent-green: #0aff60;
            --accent-red: #ff3333;
            --accent-blue: #00f3ff;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* App-like feel */
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Top Navigation */
        .top-nav {
            height: 50px;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 100;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }

        /* Main Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr; /* Sidebar | Main */
            height: calc(100vh - 50px);
        }

        /* Sidebar */
        .sidebar {
            background: rgba(0,0,0,0.3);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-panel {
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 4px;
        }

        .sidebar h3 {
            color: var(--primary-color);
            font-size: 0.75rem;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
        }

        /* Metrics Grid */
        .metric-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; }
        .metric-label { color: var(--text-muted); }
        .metric-val { font-weight: bold; font-family: var(--font-mono); }
        .val-green { color: var(--secondary-color); }
        .val-red { color: var(--danger-color); }

        /* Risk Matrix */
        .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        /* Main Content */
        .main-content {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Chart Section */
        .chart-container {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            height: 350px;
        }

        .chart-section {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chart-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }

        .chart-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: #888;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chart-btn:hover, .chart-btn.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(0, 243, 255, 0.1);
        }

        /* Semantic Cloud */
        .semantic-panel {
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 4px;
            overflow-y: auto;
        }
        .tag {
            display: inline-block;
            background: #111;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.7rem;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag:hover {
            border-color: var(--primary-color);
            color: #fff;
        }

        /* Featured Grid */
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .featured-card {
            background: rgba(0, 243, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .featured-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        .featured-badge {
            position: absolute;
            top: 0; right: 0;
            background: var(--primary-color);
            color: #000;
            font-size: 0.6rem;
            padding: 2px 6px;
            font-weight: bold;
        }

        /* Archive Grid */
        .archive-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-input {
            background: #000;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .control-input:focus { outline: none; border-color: var(--primary-color); }

        /* Archive Items */
        .archive-item {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            border-left: 3px solid #666;
            align-items: center;
        }
        .archive-item:hover {
            border-color: var(--primary-color);
            background: rgba(0, 243, 255, 0.05);
            transform: translateX(2px);
        }

        .type-badge {
            font-size: 0.6rem; padding: 2px 6px; border-radius: 2px;
            font-weight: bold; font-family: 'JetBrains Mono';
            background: #333; color: white; margin-left: 10px;
        }

        .cyber-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 6px 12px;
            border: 1px solid #444;
            color: var(--primary-color);
            background: rgba(0,0,0,0.3);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .cyber-btn:hover { border-color: var(--primary-color); background: rgba(0, 243, 255, 0.1); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        /* Type Colors */
        .type-NEWSLETTER { border-left-color: #ffff00; }
        .type-DEEP_DIVE { border-left-color: #cc0000; }
        .type-MARKET_PULSE { border-left-color: #00f3ff; }
        .type-HISTORICAL { border-left-color: #666; }
        .type-DAILY_BRIEFING { border-left-color: #0aff60; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            width: 80%; max-width: 1000px;
            height: 80%;
            background: #050b14;
            border: 1px solid var(--primary-color);
            display: grid;
            grid-template-columns: 2fr 1fr;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        .modal-main {
            padding: 30px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }
        .modal-sidebar {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            color: #fff; cursor: pointer;
            font-size: 1.5rem;
        }

    </style>
</head>
<body>
    <!-- Top Nav -->
    <nav class="top-nav">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars" style="color: #666;"></i>
            <h1 class="mono" style="margin:0; font-size:1.1rem; letter-spacing: 2px;">MARKET MAYHEM ARCHIVE</h1>
        </div>
        <div class="nav-links mono">
            <a href="dashboard.html">DASHBOARD</a>
            <a href="market_mayhem_dashboard.html">MAYHEM HUB</a>
            <a href="#" class="active">ARCHIVE</a>
            <a href="reports.html">REPORTS</a>
        </div>
        <div class="mono" style="font-size: 0.7rem; color: #444;">v24.2.0</div>
    </nav>

    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="sidebar mono">

            <!-- Strategic Command -->
            <div id="strategicPanel" class="sidebar-panel">
                <!-- Injected via JS -->
                <div style="color:#666; font-size:0.7rem;">Loading Strategy...</div>
            </div>

            <!-- Top Conviction -->
            <div id="convictionPanel" class="sidebar-panel">
                <!-- Injected via JS -->
            </div>

            <!-- Watch List -->
            <div id="watchListPanel" class="sidebar-panel">
                <!-- Injected via JS -->
            </div>

            <!-- Risk Matrix -->
            <div id="sectorRiskPanel" class="sidebar-panel">
                <!-- Injected via JS -->
            </div>

        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Chart & Cloud -->
            <div class="chart-container">
                <div class="chart-section">
                    <div style="position: absolute; top: 15px; left: 15px; z-index: 10;">
                        <div class="mono" style="color: #00f3ff; font-size: 0.9rem;">SENTIMENT & FORWARD PROJECTION</div>
                    </div>

                    <div id="timePeriodControls" class="chart-controls">
                        <button class="chart-btn" data-period="1M">1M</button>
                        <button class="chart-btn" data-period="3M">3M</button>
                        <button class="chart-btn active" data-period="ALL">ALL</button>
                    </div>

                    <canvas id="sentimentChart"></canvas>
                </div>

                <div class="semantic-panel" id="semanticCloud">
                    <!-- Tags injected via JS -->
                    <div style="color:#666; font-size:0.7rem;">Generating Semantic Cloud...</div>
                </div>
            </div>

            <!-- Featured -->
            <div style="margin-bottom: 5px;">
                <div class="mono" style="color: #00f3ff; font-size: 0.8rem; margin-bottom: 10px;">FEATURED INTELLIGENCE</div>
                <div id="featuredGrid" class="featured-grid">
                    <!-- Featured items injected via JS -->
                </div>
            </div>

            <!-- Filters -->
            <div class="archive-controls">
                <div class="control-group" style="flex-grow: 1;">
                     <div class="mono" style="color: #00f3ff; font-size: 0.8rem;">ARCHIVE SEARCH</div>
                     <input type="text" id="searchInput" placeholder="Search Archives..." class="control-input" style="width: 100%;">
                </div>
                <div class="control-group">
                    <div class="mono" style="color: #888; font-size: 0.8rem;">YEAR</div>
                    <select id="yearFilter" class="control-input">
                        <option value="all">All Years</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="HISTORICAL">Historical</option>
                    </select>
                </div>
                <div class="control-group">
                     <div class="mono" style="color: #888; font-size: 0.8rem;">TYPE</div>
                    <select id="typeFilter" class="control-input">
                        <option value="all">All Types</option>
                        <option value="NEWSLETTER">Newsletter</option>
                        <option value="DAILY_BRIEFING">Daily Briefing</option>
                        <option value="MARKET_PULSE">Market Pulse</option>
                        <option value="HISTORICAL">Historical</option>
                    </select>
                </div>
                 <div class="control-group">
                     <div class="mono" style="color: #888; font-size: 0.8rem;">SORT</div>
                    <select id="sortOrder" class="control-input">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="conviction">High Conviction</option>
                        <option value="sentiment">High Sentiment</option>
                    </select>
                </div>
            </div>

            <!-- Archive Items Grid (Injected) -->
            <div id="archiveGrid" style="padding-bottom: 50px;">
                <!-- Loading State -->
                <div style="text-align:center; padding:50px; color:#666;">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading Archive Data...
                </div>
            </div>

        </main>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-main" id="modalMain">
                <!-- Content injected here -->
            </div>
            <div class="modal-sidebar">
                <button class="cyber-btn" onclick="document.getElementById('reportModal').style.display='none'" style="align-self: flex-end; margin-bottom: 10px;">CLOSE</button>

                <div style="border-bottom:1px solid #333; padding-bottom:10px;">
                    <div class="mono" style="color:#00f3ff; font-size:0.8rem; margin-bottom:10px;">SYSTEM 2 CRITIQUE</div>
                    <div id="modalCritique"></div>
                </div>

                <div style="flex-grow:1; display:flex; flex-direction:column;">
                    <div class="mono" style="color:#00f3ff; font-size:0.8rem; margin:15px 0 10px 0;">REALIZED ALPHA</div>
                    <div id="alphaStats" style="font-size:0.8rem; margin-bottom:5px; font-family:var(--font-mono);"></div>
                    <div style="flex-grow:1; position:relative; min-height:100px;">
                        <canvas id="alphaChart"></canvas>
                    </div>
                </div>

                <div id="modalMeta"></div>
            </div>
        </div>
    </div>

</body>
</html>
