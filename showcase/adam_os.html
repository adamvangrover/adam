<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM v24 :: Unified Financial OS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --os-bg: #030712;
            --taskbar-bg: rgba(5, 11, 20, 0.95);
            --primary: #00f3ff;
            --secondary: #0aff60;
            --danger: #ff3333;
            --border: #333;
            --window-bg: rgba(10, 15, 25, 0.95);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--os-bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(10, 255, 96, 0.05), transparent 25%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Background Grid */
        .os-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            z-index: 0;
        }

        /* Desktop Area */
        .desktop {
            flex: 1;
            position: relative;
            z-index: 10;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 20px;
        }

        /* Desktop Icons */
        .desktop-icon {
            width: 80px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
            user-select: none;
        }
        .desktop-icon:hover { background: rgba(255,255,255,0.1); }
        .desktop-icon i { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,243,255,0.3); }
        .desktop-icon .icon-label { font-size: 0.75rem; font-weight: 600; text-shadow: 1px 1px 3px #000; }

        /* Window Manager */
        .window {
            position: absolute;
            background: var(--window-bg);
            border: 1px solid var(--primary);
            border-radius: 6px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,243,255,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
            min-height: 200px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        .window.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
            z-index: 100;
        }
        .window.maximized {
            top: 0 !important; left: 0 !important; width: 100% !important; height: calc(100vh - 40px) !important;
            border-radius: 0; border: none;
        }

        .window-header {
            height: 35px;
            background: linear-gradient(90deg, rgba(0,243,255,0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: grab;
            user-select: none;
        }
        .window-header:active { cursor: grabbing; }
        .window-title { font-size: 0.8rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .window-controls { display: flex; gap: 10px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: 0.2s; }
        .win-btn:hover { opacity: 1; }
        .btn-close { background: var(--danger); }
        .btn-max { background: #f59e0b; }
        .btn-min { background: var(--secondary); }

        .window-content { flex: 1; position: relative; background: #000; }
        .window-content iframe { width: 100%; height: 100%; border: none; }

        /* Resize Handles */
        .resizer { position: absolute; }
        .resizer-r { right: 0; top: 0; width: 5px; height: 100%; cursor: e-resize; }
        .resizer-b { bottom: 0; left: 0; width: 100%; height: 5px; cursor: s-resize; }
        .resizer-br { bottom: 0; right: 0; width: 10px; height: 10px; cursor: se-resize; z-index: 10; }

        /* Taskbar */
        .taskbar {
            height: 40px;
            background: var(--taskbar-bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .start-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--primary);
            font-size: 1.2rem;
            width: 40px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .start-btn:hover, .start-btn.active { background: rgba(0,243,255,0.1); border-color: rgba(0,243,255,0.3); }

        .taskbar-apps {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 15px;
        }

        .taskbar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            max-width: 150px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            transition: 0.2s;
        }
        .taskbar-item:hover { background: rgba(255,255,255,0.1); }
        .taskbar-item.active { background: rgba(0,243,255,0.1); border-color: var(--primary); color: var(--primary); }

        .sys-tray {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--muted);
            padding-right: 10px;
        }

        /* Start Menu */
        .start-menu {
            position: absolute;
            bottom: 50px;
            left: 10px;
            width: 400px;
            height: 500px;
            background: rgba(10, 15, 25, 0.98);
            border: 1px solid var(--primary);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            z-index: 2000;
            backdrop-filter: blur(20px);
        }
        .start-menu.active { display: flex; }

        .sm-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .sm-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.2rem; font-weight: bold; }

        .sm-search { padding: 15px; border-bottom: 1px solid var(--border); }
        .sm-search input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 20px; font-family: 'JetBrains Mono'; font-size: 0.8rem; outline: none; box-sizing: border-box; }
        .sm-search input:focus { border-color: var(--primary); }

        .sm-content { flex: 1; overflow-y: auto; padding: 10px; }
        .sm-category { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin: 15px 10px 5px 10px; letter-spacing: 1px; }

        .sm-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .sm-item:hover { background: rgba(0,243,255,0.1); }
        .sm-item i { width: 24px; text-align: center; color: var(--primary); font-size: 1.2rem; }
        .sm-item-text .title { font-size: 0.85rem; color: #fff; margin-bottom: 2px; }
        .sm-item-text .desc { font-size: 0.65rem; color: var(--muted); }

    </style>
</head>
<body>
    <div class="os-grid"></div>

    <!-- Desktop Icons -->
    <div class="desktop" id="desktop">
        <div class="desktop-icon" onclick="openWindow('Intelligence Hub', 'intelligence_hub.html', 'fa-layer-group')">
            <i class="fas fa-layer-group"></i>
            <div class="icon-label mono">INTEL HUB</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('Mission Control', 'mission_control_v3.html', 'fa-satellite-dish')">
            <i class="fas fa-satellite-dish" style="color: var(--secondary);"></i>
            <div class="icon-label mono">MISSION CTL</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('System Terminal', 'terminal.html', 'fa-terminal')">
            <i class="fas fa-terminal" style="color: #eab308;"></i>
            <div class="icon-label mono">TERMINAL</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('War Room', 'war_room.html', 'fa-shield-alt')">
            <i class="fas fa-shield-alt" style="color: var(--danger);"></i>
            <div class="icon-label mono">WAR ROOM</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('Alpha Scanner', 'app_alpha_scanner.html', 'fa-crosshairs')">
            <i class="fas fa-crosshairs" style="color: #ef4444;"></i>
            <div class="icon-label mono">ALPHA SCAN</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('System Graph', 'system_knowledge_graph.html', 'fa-project-diagram')">
            <i class="fas fa-project-diagram" style="color: #a855f7;"></i>
            <div class="icon-label mono">K-GRAPH</div>
        </div>
    </div>

    <!-- Ticker Widget -->
    <div style="position: absolute; top: 20px; right: 20px; width: 300px; background: rgba(5,11,20,0.8); border: 1px solid var(--border); border-radius: 8px; padding: 15px; backdrop-filter: blur(10px); z-index: 5;">
        <div class="mono" style="color: var(--primary); font-size: 0.8rem; border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span><i class="fas fa-chart-line"></i> LIVE TAPE</span>
            <span style="color: #0aff60;">MARKETS OPEN</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <span style="color: #ccc;">SPX</span>
            <span style="color: #0aff60;">5,993.42 (+0.69%)</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <span style="color: #ccc;">NDX</span>
            <span style="color: #0aff60;">21,042.15 (+1.12%)</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <span style="color: #ccc;">BTC</span>
            <span style="color: #0aff60;">104,250.00 (+4.2%)</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <span style="color: #ccc;">VIX</span>
            <span style="color: #ff3333;">15.10 (-2.5%)</span>
        </div>
    </div>

    <!-- Window Container -->
    <div id="window-container"></div>

    <!-- Start Menu -->
    <div class="start-menu" id="startMenu">
        <div class="sm-header">
            <div class="sm-avatar"><i class="fas fa-user-astronaut"></i></div>
            <div>
                <div style="font-weight: bold; font-size: 1rem;">System Root</div>
                <div class="mono" style="font-size: 0.7rem; color: var(--primary);">ADAM OS v24.1.0</div>
            </div>
        </div>
        <div class="sm-search">
            <input type="text" id="smSearchInput" placeholder="Search apps, reports, models..." onkeyup="filterStartMenu()">
        </div>
        <div class="sm-content" id="smContent">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-btn" id="startBtn" onclick="toggleStartMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="taskbar-apps" id="taskbarApps">
            <!-- Active apps go here -->
        </div>
        <div class="sys-tray mono">
            <span style="color: var(--secondary);"><i class="fas fa-circle" style="font-size: 0.5rem; vertical-align: middle;"></i> NODE ONLINE</span>
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <script>
        // --- OS Logic ---

        let zIndexCounter = 100;
        let windows = {};

        const appRegistry = [
            { cat: 'Analysis Consoles', name: 'Alpha Scanner', url: 'app_alpha_scanner.html', icon: 'fa-crosshairs', desc: 'Conviction Monitor' },
            { cat: 'Core Systems', name: 'Intelligence Hub', url: 'intelligence_hub.html', icon: 'fa-layer-group', desc: 'Central Access Matrix' },
            { cat: 'Core Systems', name: 'Mission Control', url: 'mission_control_v3.html', icon: 'fa-satellite-dish', desc: 'Global Dashboard' },
            { cat: 'Core Systems', name: 'System Terminal', url: 'terminal.html', icon: 'fa-terminal', desc: 'Command Line' },
            { cat: 'Analysis Consoles', name: 'War Room', url: 'war_room.html', icon: 'fa-shield-alt', desc: 'Conflict Sim' },
            { cat: 'Analysis Consoles', name: 'Credit Workstation', url: 'credit_analyst_workstation.html', icon: 'fa-chart-pie', desc: 'Enterprise Credit' },
            { cat: 'Analysis Consoles', name: 'Nexus Explorer', url: 'nexus_explorer.html', icon: 'fa-project-diagram', desc: 'Neural Maps' },
            { cat: 'Intelligence Categories', name: 'Agents Hub', url: 'hub_agents.html', icon: 'fa-robot', desc: 'Autonomous AI' },
            { cat: 'Intelligence Categories', name: 'Newsletters Hub', url: 'hub_newsletters.html', icon: 'fa-envelope-open-text', desc: 'Daily Briefings' },
            { cat: 'Intelligence Categories', name: 'Reports Hub', url: 'hub_reports.html', icon: 'fa-file-alt', desc: 'House Views' },
            { cat: 'Intelligence Categories', name: 'Deep Dives Hub', url: 'hub_deep_dives.html', icon: 'fa-water', desc: 'Thematic Exploration' },
            { cat: 'Intelligence Categories', name: 'Market Signals Hub', url: 'hub_market_signals.html', icon: 'fa-broadcast-tower', desc: 'Real-time Alerts' },
            { cat: 'Intelligence Categories', name: 'Trading Intel Hub', url: 'hub_trading_intelligence.html', icon: 'fa-chart-line', desc: 'Alpha Generation' },
            { cat: 'Legacy', name: 'Index Override', url: 'index.html', icon: 'fa-home', desc: 'Old System Root' }
        ];

        // Init Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Start Menu Logic
        const startMenu = document.getElementById('startMenu');
        const startBtn = document.getElementById('startBtn');
        const smContent = document.getElementById('smContent');

        function toggleStartMenu() {
            startMenu.classList.toggle('active');
            startBtn.classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            if (!startMenu.contains(e.target) && !startBtn.contains(e.target)) {
                startMenu.classList.remove('active');
                startBtn.classList.remove('active');
            }
        });

        function populateStartMenu(query = '') {
            smContent.innerHTML = '';
            const grouped = {};

            appRegistry.forEach(app => {
                if (query && !app.name.toLowerCase().includes(query) && !app.desc.toLowerCase().includes(query)) return;
                if (!grouped[app.cat]) grouped[app.cat] = [];
                grouped[app.cat].push(app);
            });

            for (const [cat, apps] of Object.entries(grouped)) {
                const catEl = document.createElement('div');
                catEl.className = 'sm-category mono';
                catEl.innerText = cat;
                smContent.appendChild(catEl);

                apps.forEach(app => {
                    const item = document.createElement('div');
                    item.className = 'sm-item';
                    item.onclick = () => {
                        openWindow(app.name, app.url, app.icon);
                        toggleStartMenu();
                    };
                    item.innerHTML = `
                        <i class="fas ${app.icon}"></i>
                        <div class="sm-item-text">
                            <div class="title mono">${app.name}</div>
                            <div class="desc">${app.desc}</div>
                        </div>
                    `;
                    smContent.appendChild(item);
                });
            }
        }

        function filterStartMenu() {
            const q = document.getElementById('smSearchInput').value.toLowerCase();
            populateStartMenu(q);
        }

        populateStartMenu();

        // Window Management
        function openWindow(title, url, icon) {
            const winId = 'win-' + Math.random().toString(36).substr(2, 9);

            // Default size & pos
            const width = Math.min(1200, window.innerWidth * 0.8);
            const height = Math.min(800, window.innerHeight * 0.8);
            const top = 50 + (Object.keys(windows).length * 30) % 200;
            const left = 50 + (Object.keys(windows).length * 30) % 200;

            const winHtml = `
                <div class="window active" id="${winId}" style="width: ${width}px; height: ${height}px; top: ${top}px; left: ${left}px; z-index: ${++zIndexCounter};">
                    <div class="window-header" onmousedown="startDrag(event, '${winId}')">
                        <div class="window-title mono"><i class="fas ${icon}"></i> ${title}</div>
                        <div class="window-controls">
                            <div class="win-btn btn-min" onclick="minWindow('${winId}')"></div>
                            <div class="win-btn btn-max" onclick="maxWindow('${winId}')"></div>
                            <div class="win-btn btn-close" onclick="closeWindow('${winId}')"></div>
                        </div>
                    </div>
                    <div class="window-content">
                        <iframe src="${url}" name="frame_${winId}" onload="injectIframeInterop(this, '${winId}')"></iframe>
                    </div>
                    <div class="resizer resizer-r" onmousedown="startResize(event, '${winId}', 'r')"></div>
                    <div class="resizer resizer-b" onmousedown="startResize(event, '${winId}', 'b')"></div>
                    <div class="resizer resizer-br" onmousedown="startResize(event, '${winId}', 'br')"></div>
                </div>
            `;

            document.getElementById('window-container').insertAdjacentHTML('beforeend', winHtml);

            // Taskbar Item
            const tbItemHtml = `
                <div class="taskbar-item active mono" id="tb-${winId}" onclick="focusWindow('${winId}')">
                    <i class="fas ${icon}"></i> ${title}
                </div>
            `;
            document.getElementById('taskbarApps').insertAdjacentHTML('beforeend', tbItemHtml);

            windows[winId] = { title, url, icon, min: false };
            focusWindow(winId);
        }

        // Allow links clicked inside iframes to optionally open as new OS windows
        function injectIframeInterop(iframe, winId) {
            try {
                const innerDoc = iframe.contentDocument || iframe.contentWindow.document;

                // Add a specific click listener to internal links
                const links = innerDoc.querySelectorAll('a');
                links.forEach(link => {
                    link.addEventListener('click', (e) => {
                        const targetUrl = link.getAttribute('href');
                        // If it's a relative HTML file within the OS ecosystem, trap it and open a window
                        if (targetUrl && targetUrl.endsWith('.html') && !targetUrl.startsWith('http')) {
                            e.preventDefault();
                            // Try to infer a nice title
                            let newTitle = link.innerText.trim() || targetUrl.replace('.html','').replace(/_/g, ' ').toUpperCase();
                            if(newTitle.length > 25) newTitle = newTitle.substring(0,25)+"...";

                            // Extract directory context if needed, simplified for showcase root
                            openWindow(newTitle, targetUrl, 'fa-file-alt');
                        }
                    });
                });
            } catch(e) {
                // Ignore cross-origin errors if they occur
            }
        }

        function focusWindow(id) {
            if(!document.getElementById(id)) return;

            // Unfocus others
            document.querySelectorAll('.window').forEach(w => w.style.borderColor = '#333');
            document.querySelectorAll('.taskbar-item').forEach(t => t.classList.remove('active'));

            const win = document.getElementById(id);
            win.style.zIndex = ++zIndexCounter;
            win.style.borderColor = 'var(--primary)';
            win.style.opacity = '1';
            win.style.transform = 'scale(1)';
            win.style.pointerEvents = 'all';

            document.getElementById('tb-' + id).classList.add('active');
            windows[id].min = false;
        }

        function closeWindow(id) {
            document.getElementById(id).remove();
            document.getElementById('tb-' + id).remove();
            delete windows[id];
        }

        function maxWindow(id) {
            const win = document.getElementById(id);
            win.classList.toggle('maximized');
            focusWindow(id);
        }

        function minWindow(id) {
            const win = document.getElementById(id);
            win.style.opacity = '0';
            win.style.transform = 'scale(0.95)';
            win.style.pointerEvents = 'none';
            document.getElementById('tb-' + id).classList.remove('active');
            windows[id].min = true;
        }

        // Dragging & Resizing Logic
        let isDragging = false;
        let isResizing = false;
        let activeWin = null;
        let startX, startY, startWinX, startWinY, startW, startH, resizeDir;

        function startDrag(e, id) {
            if(e.target.closest('.window-controls')) return; // Don't drag if clicking buttons
            isDragging = true;
            activeWin = document.getElementById(id);
            focusWindow(id);

            if(activeWin.classList.contains('maximized')) return;

            startX = e.clientX;
            startY = e.clientY;
            startWinX = activeWin.offsetLeft;
            startWinY = activeWin.offsetTop;

            // Overlay iframe to prevent event swallowing
            document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'none');
        }

        function startResize(e, id, dir) {
            e.stopPropagation();
            isResizing = true;
            resizeDir = dir;
            activeWin = document.getElementById(id);
            focusWindow(id);

            startX = e.clientX;
            startY = e.clientY;
            startW = activeWin.offsetWidth;
            startH = activeWin.offsetHeight;

            document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'none');
        }

        document.addEventListener('mousemove', (e) => {
            if (isDragging && activeWin && !activeWin.classList.contains('maximized')) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                activeWin.style.left = `${startWinX + dx}px`;
                activeWin.style.top = `${Math.max(0, startWinY + dy)}px`; // Prevent dragging above top
            }

            if (isResizing && activeWin) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                if (resizeDir.includes('r')) activeWin.style.width = `${Math.max(300, startW + dx)}px`;
                if (resizeDir.includes('b')) activeWin.style.height = `${Math.max(200, startH + dy)}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            activeWin = null;
            document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'all');
        });

        // Open initial hub window
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                openWindow('Intelligence Hub', 'intelligence_hub.html', 'fa-layer-group');
            }, 500);
        });

    </script>
</body>
</html>
