<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM Sovereign OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-dark: #020408;
            --cyan-glow: #00f0ff;
            --purple-glow: #bc13fe;
            --green-glow: #10b981;
            --panel-glass: rgba(10, 15, 30, 0.85);
            --dock-glass: rgba(5, 10, 20, 0.6);
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Dark overlay for background image */
        .bg-overlay {
            position: absolute; inset: 0; background: rgba(2, 4, 8, 0.90); z-index: -1;
            /* Hexagon pattern */
            background-image: radial-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Window Styling */
        .os-window {
            position: absolute;
            background: #020408;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            border-radius: 6px;
            overflow: hidden;
            resize: both;
            min-width: 400px; min-height: 300px;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .os-window.active {
            border-color: var(--cyan-glow);
            z-index: 50;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .window-bar {
            background: #0f172a;
            padding: 6px 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            user-select: none;
        }

        .window-content { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #020408; }

        /* Dock Styling */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--dock-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 20px;
            display: flex; gap: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .dock-item {
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: none; padding: 0; outline: none;
        }
        .dock-item:hover, .dock-item:focus {
            transform: translateY(-5px) scale(1.1);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Tooltip */
        .dock-item::after {
            content: attr(data-title);
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 10px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            white-space: nowrap;
        }
        .dock-item:hover::after, .dock-item:focus::after { opacity: 1; }

        .app-dot {
            width: 4px; height: 4px; background: var(--cyan-glow); border-radius: 50%;
            position: absolute; bottom: -6px; opacity: 0;
        }
        .app-dot.running { opacity: 1; }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 w-full h-8 bg-black/40 backdrop-blur flex justify-between items-center px-4 z-40 border-b border-white/5">
        <div class="flex items-center gap-4 text-[10px] font-bold tracking-widest text-gray-400">
            <span class="text-white">SOVEREIGN OS <span class="text-cyan-400">v1.0</span></span>
            <span class="hover:text-white cursor-pointer" onclick="alert('System File Manager initializing...')">FILE</span>
            <span class="hover:text-white cursor-pointer">EDIT</span>
            <span class="hover:text-white cursor-pointer">VIEW</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 px-2 py-0.5 bg-cyan-900/20 border border-cyan-500/30 rounded text-[10px] text-cyan-400 cursor-help" title="Neural Link Active">
                <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></div>
                NEURAL_LINK: ONLINE
            </div>
            <div class="text-[10px] text-gray-400 font-mono" id="clock">00:00</div>
        </div>
    </div>

    <!-- Desktop Area -->
    <div id="desktop" class="w-full h-full pt-8 pb-24 relative">
        <!-- Windows injected here -->
    </div>

    <!-- Dock -->
    <div class="dock">
        <button class="dock-item" type="button" aria-label="Portfolio Attribution" onclick="openWindow('portfolio', 'Portfolio Attribution', 'apps/portfolio_attribution.html', 1100, 750)" data-title="Portfolio Attribution">
            <i data-lucide="pie-chart" class="text-blue-500 w-6 h-6"></i>
            <div class="app-dot" id="dot-portfolio"></div>
        </button>
        <button class="dock-item" type="button" aria-label="Memo Synthesizer" onclick="openWindow('memo', 'Memo Synthesizer', 'apps/memo_synthesizer.html', 1000, 700)" data-title="Memo Synthesizer">
            <i data-lucide="file-text" class="text-emerald-400 w-6 h-6"></i>
            <div class="app-dot" id="dot-memo"></div>
        </button>
        <button class="dock-item" type="button" aria-label="ML Alpha Hub" onclick="openWindow('ml', 'ML Alpha Hub', 'apps/ml_alpha_hub.html', 1200, 800)" data-title="ML Alpha Hub">
            <i data-lucide="cpu" class="text-purple-400 w-6 h-6"></i>
            <div class="app-dot" id="dot-ml"></div>
        </button>
        <button class="dock-item" type="button" aria-label="File Explorer" onclick="openWindow('files', 'Advanced File Explorer', 'apps/advanced_file_explorer.html', 900, 600)" data-title="File Explorer">
            <i data-lucide="folder-open" class="text-yellow-400 w-6 h-6"></i>
            <div class="app-dot" id="dot-files"></div>
        </button>
        <button class="dock-item" type="button" aria-label="Market Mayhem" onclick="openWindow('mayhem', 'Market Mayhem Hub', 'apps/market_mayhem_hub.html', 1100, 750)" data-title="Market Mayhem">
            <i data-lucide="flame" class="text-brand-red w-6 h-6"></i>
            <div class="app-dot" id="dot-mayhem"></div>
        </button>

        <div class="w-[1px] h-8 bg-white/10 mx-2"></div>

        <button class="dock-item" type="button" aria-label="Terminal" onclick="openWindow('term', 'Terminal', 'terminal_profile.html', 800, 500)" data-title="Terminal">
            <i data-lucide="terminal-square" class="text-gray-300 w-6 h-6"></i>
            <div class="app-dot" id="dot-term"></div>
        </button>
        <button class="dock-item" type="button" aria-label="Toggle Fullscreen" onclick="toggleFullScreen()" data-title="Toggle Fullscreen">
            <i data-lucide="monitor" class="text-gray-400 w-6 h-6"></i>
        </button>
        <button class="dock-item" type="button" aria-label="Exit to System" onclick="window.location.href='index.html'" data-title="Exit to System">
            <i data-lucide="log-out" class="text-red-400 w-6 h-6"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();
        let zIndexCounter = 100;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function openWindow(id, title, src, w, h) {
            let win = document.getElementById(`win-${id}`);
            if (win) {
                bringToFront(win);
                return;
            }

            win = document.createElement('div');
            win.id = `win-${id}`;
            win.className = 'os-window active';
            win.style.width = w + 'px';
            win.style.height = h + 'px';

            const count = document.querySelectorAll('.os-window').length;
            win.style.top = (50 + (count * 30)) + 'px';
            win.style.left = (50 + (count * 30)) + 'px';
            win.style.zIndex = ++zIndexCounter;

            win.innerHTML = `
                <div class="window-bar" onmousedown="startDrag(event, '${id}')">
                    <div class="flex items-center gap-2">
                         <i data-lucide="app-window" class="w-3 h-3 text-gray-500"></i>
                         <span class="text-xs font-bold text-gray-300 tracking-wider">${title}</span>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div onclick="minimizeWindow('${id}')" class="w-3 h-3 rounded-full bg-yellow-500/50 hover:bg-yellow-500 cursor-pointer border border-yellow-500/30" title="Minimize"></div>
                        <div onclick="closeWindow('${id}')" class="w-3 h-3 rounded-full bg-red-500/50 hover:bg-red-500 cursor-pointer border border-red-500/30" title="Close"></div>
                    </div>
                </div>
                <div class="window-content">
                    <iframe src="${src}"></iframe>
                </div>
            `;

            document.getElementById('desktop').appendChild(win);
            const dot = document.getElementById(`dot-${id}`);
            if(dot) dot.classList.add('running');

            win.onmousedown = () => bringToFront(win);
            lucide.createIcons();
        }

        function closeWindow(id) {
            const win = document.getElementById(`win-${id}`);
            if(win) win.remove();
            const dot = document.getElementById(`dot-${id}`);
            if(dot) dot.classList.remove('running');
        }

        function minimizeWindow(id) {
            const win = document.getElementById(`win-${id}`);
            if(win) win.style.display = 'none';
        }

        function bringToFront(el) {
            if(el.style.display === 'none') el.style.display = 'flex';
            document.querySelectorAll('.os-window').forEach(w => w.classList.remove('active'));
            el.classList.add('active');
            el.style.zIndex = ++zIndexCounter;
        }

        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let currentWindow = null;

        function startDrag(e, id) {
            isDragging = true;
            currentWindow = document.getElementById(`win-${id}`);
            bringToFront(currentWindow);

            const rect = currentWindow.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;

            const overlay = document.createElement('div');
            overlay.id = 'drag-overlay';
            overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.zIndex = '9999';
            document.body.appendChild(overlay);
        }

        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !currentWindow) return;

            let x = e.clientX - dragOffset.x;
            let y = e.clientY - dragOffset.y;

            if(y < 32) y = 32;

            currentWindow.style.left = x + 'px';
            currentWindow.style.top = y + 'px';
        });

        document.addEventListener('mouseup', () => {
            if(isDragging) {
                isDragging = false;
                currentWindow = null;
                const overlay = document.getElementById('drag-overlay');
                if(overlay) overlay.remove();
            }
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>

    <script src="../showcase/js/nav.js" data-root=".."></script>
</body>
</html>
