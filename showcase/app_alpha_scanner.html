<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Scanner</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050b14; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .header { padding: 15px 20px; border-bottom: 1px solid #333; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; }
        .title { color: #ef4444; font-size: 1.2rem; font-weight: bold; }
        .grid { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 80px 1fr 100px 100px 120px; gap: 15px; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid #333; align-items: center; border-radius: 4px; }
        .row:hover { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .ticker { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .bar-container { height: 8px; background: #222; border-radius: 4px; overflow: hidden; width: 100%; margin-top: 5px; }
        .bar { height: 100%; background: #0aff60; }
        .btn { padding: 6px 12px; background: transparent; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 0.7rem; transition: 0.2s; }
        .btn:hover { border-color: #ef4444; color: #ef4444; }
    </style>
</head>
<body>
    <div class="header mono">
        <div class="title"><i class="fas fa-radar"></i> HIGH CONVICTION ALPHA SCANNER</div>
        <div style="color: #0aff60;"><i class="fas fa-satellite-dish"></i> LIVE</div>
    </div>
    <div class="grid mono">
        <!-- Header row -->
        <div style="display: grid; grid-template-columns: 80px 1fr 100px 100px 120px; gap: 15px; padding: 0 15px; color: #888; font-size: 0.7rem; text-transform: uppercase;">
            <div>Ticker</div>
            <div>Catalyst / AI Sentiment</div>
            <div>Score</div>
            <div>Risk</div>
            <div>Action</div>
        </div>

        <div class="row">
            <div class="ticker">PLTR</div>
            <div>
                <div style="color: #aaa; font-size: 0.8rem;">AIP Enterprise Adoption Acceleration</div>
                <div class="bar-container"><div class="bar" style="width: 92%;"></div></div>
            </div>
            <div style="color: #0aff60; font-weight: bold; font-size: 1.2rem;">92/100</div>
            <div style="color: #f59e0b;">MED</div>
            <button class="btn">VIEW MEMO</button>
        </div>

        <div class="row">
            <div class="ticker">SMCI</div>
            <div>
                <div style="color: #aaa; font-size: 0.8rem;">Server Rack Density Upgrades</div>
                <div class="bar-container"><div class="bar" style="width: 88%;"></div></div>
            </div>
            <div style="color: #0aff60; font-weight: bold; font-size: 1.2rem;">88/100</div>
            <div style="color: #ff3333;">HIGH</div>
            <button class="btn">VIEW MEMO</button>
        </div>

        <div class="row">
            <div class="ticker">CRWD</div>
            <div>
                <div style="color: #aaa; font-size: 0.8rem;">Sovereign Cloud Expansion</div>
                <div class="bar-container"><div class="bar" style="width: 85%;"></div></div>
            </div>
            <div style="color: #0aff60; font-weight: bold; font-size: 1.2rem;">85/100</div>
            <div style="color: #0aff60;">LOW</div>
            <button class="btn">VIEW MEMO</button>
        </div>

        <div class="row">
            <div class="ticker">NVDA</div>
            <div>
                <div style="color: #aaa; font-size: 0.8rem;">Blackwell Yield Improvements</div>
                <div class="bar-container"><div class="bar" style="width: 81%;"></div></div>
            </div>
            <div style="color: #0aff60; font-weight: bold; font-size: 1.2rem;">81/100</div>
            <div style="color: #f59e0b;">MED</div>
            <button class="btn">VIEW MEMO</button>
        </div>
    </div>
</body>
</html>
