<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM | Artisanal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex flex-col grid-bg overflow-hidden">
    <div class="scan-line"></div>
    <div class="scan-glow"></div>

    <!-- Main Content -->
    <main class="flex-1 p-6 grid grid-cols-12 gap-6 overflow-y-auto custom-scrollbar">

        <!-- Header -->
        <div class="col-span-12 cyber-card p-6 rounded-lg border-l-4 border-purple-500 relative overflow-hidden group">
            <div class="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-purple-500/10 to-transparent pointer-events-none"></div>
            <h2 class="text-3xl font-bold text-white mb-2 font-mono tracking-tight">ARTISANAL STUDIO</h2>
            <p class="text-slate-400 max-w-2xl text-sm leading-relaxed relative z-10">
                Synthetic Data Lab & Semantic Search Interface.
                <br>Dataset: <span class="text-purple-400 font-bold" id="dataset-status">Not Loaded</span> |
                Status: <span class="text-emerald-400">READY</span>
            </p>
        </div>

        <!-- Controls (Left) -->
        <div class="col-span-12 lg:col-span-4 flex flex-col gap-6">
            <div class="cyber-card p-5 rounded">
                <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fas fa-sliders-h"></i> Controls
                </h3>

                <button id="load-btn" class="cyber-btn w-full mb-4 flex items-center justify-center gap-2">
                    <i class="fas fa-database"></i> Load Synthetic Batch 001
                </button>

                <div class="relative">
                    <input type="text" id="search-input" class="cyber-input" placeholder="Semantic Search (e.g. 'supply chain risk')..." disabled>
                    <i class="fas fa-search absolute right-3 top-3 text-slate-500"></i>
                </div>

                <div class="mt-4 text-xs text-slate-500 font-mono">
                    <p>Metrics:</p>
                    <div class="flex justify-between mt-1">
                        <span>Items Loaded:</span>
                        <span class="text-white" id="item-count">0</span>
                    </div>
                    <div class="flex justify-between mt-1">
                        <span>Load Time:</span>
                        <span class="text-white" id="load-time">0ms</span>
                    </div>
                </div>
            </div>

            <!-- Log -->
            <div class="cyber-card p-0 rounded flex-1 flex flex-col min-h-[200px]">
                <div class="p-3 bg-slate-900/80 border-b border-slate-700">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">System Log</h3>
                </div>
                <div id="logs" class="flex-1 p-3 font-mono text-[10px] text-slate-300 overflow-y-auto h-full bg-[#050b14]">
                    <div class="text-slate-500">Initializing Studio...</div>
                </div>
            </div>
        </div>

        <!-- Results (Right) -->
        <div class="col-span-12 lg:col-span-8 flex flex-col h-full overflow-hidden">
            <div class="cyber-card p-0 rounded flex-1 flex flex-col overflow-hidden h-full">
                <div class="p-4 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                    <h3 class="text-xs font-bold text-white uppercase tracking-widest flex items-center gap-2">
                        <i class="fas fa-list-ul"></i> Data Stream
                    </h3>
                    <span class="cyber-badge badge-blue" id="result-badge">Waiting for Data</span>
                </div>

                <div id="results-container" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[#050b14]">
                    <!-- Items go here -->
                    <div class="text-center text-slate-600 mt-20">
                        <i class="fas fa-inbox text-4xl mb-4 opacity-50"></i>
                        <p>No data loaded.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Dependencies -->
    <script src="js/mock_data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/data_manager_modular.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadBtn = document.getElementById('load-btn');
            const searchInput = document.getElementById('search-input');
            const resultsContainer = document.getElementById('results-container');
            const logs = document.getElementById('logs');
            const datasetStatus = document.getElementById('dataset-status');
            const itemCount = document.getElementById('item-count');
            const loadTime = document.getElementById('load-time');
            const resultBadge = document.getElementById('result-badge');

            let currentData = [];

            // Log Helper
            const log = (msg, type='INFO') => {
                const div = document.createElement('div');
                const time = new Date().toLocaleTimeString('en-US', {hour12:false});
                let color = 'text-cyan-400';
                if(type==='ERROR') color='text-red-400';
                if(type==='SUCCESS') color='text-emerald-400';

                div.innerHTML = `<span class="text-slate-600">[${time}]</span> <span class="${color}">></span> ${msg}`;
                logs.appendChild(div);
                logs.scrollTop = logs.scrollHeight;
            };

            // Render Item
            const renderItem = (item, score=null) => {
                const scoreBadge = score ? `<span class="cyber-badge badge-amber ml-2">Score: ${score}</span>` : '';
                const tags = (item.tags || []).map(t => `<span class="text-[10px] bg-slate-800 text-slate-400 px-1 rounded border border-slate-700">${t}</span>`).join(' ');

                return `
                    <div class="p-4 bg-slate-900/50 border border-slate-800 rounded hover:border-purple-500/50 transition-all group">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-xs font-mono text-purple-400">${item.id}</div>
                            <div>${scoreBadge}</div>
                        </div>
                        <div class="mb-3">
                            <div class="text-xs text-slate-500 uppercase mb-1">Input (Query)</div>
                            <div class="text-sm text-white font-medium">${item.input}</div>
                        </div>
                        <div class="mb-3 pl-3 border-l-2 border-slate-700">
                            <div class="text-xs text-slate-500 uppercase mb-1">Output (Reasoning)</div>
                            <div class="text-sm text-slate-300">${item.output}</div>
                        </div>
                        <div class="flex justify-between items-center mt-2 border-t border-slate-800 pt-2">
                            <div class="flex gap-2">${tags}</div>
                            <div class="text-[10px] text-slate-600 font-mono">Conf: ${(item.metadata?.confidence || 0).toFixed(2)}</div>
                        </div>
                    </div>
                `;
            };

            // Render List
            const renderList = (data, scoreMap={}) => {
                resultsContainer.innerHTML = '';
                if(data.length === 0) {
                    resultsContainer.innerHTML = `<div class="text-center text-slate-600 mt-10">No results found.</div>`;
                    return;
                }

                data.forEach(item => {
                    const score = scoreMap[item.id];
                    resultsContainer.innerHTML += renderItem(item, score);
                });
                resultBadge.innerText = `${data.length} Items`;
            };

            // Load Data
            loadBtn.addEventListener('click', async () => {
                try {
                    log("Fetching Artisanal Data...", "INFO");
                    loadBtn.disabled = true;
                    loadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

                    const start = performance.now();

                    // Call Modular Manager
                    const data = await window.modularDataManager.loadArtisanalData();
                    currentData = data;

                    const end = performance.now();
                    const duration = (end - start).toFixed(2);

                    // Update UI
                    datasetStatus.innerText = "Active (Batch 001)";
                    datasetStatus.classList.remove('text-purple-400');
                    datasetStatus.classList.add('text-emerald-400');

                    itemCount.innerText = data.length;
                    loadTime.innerText = `${duration}ms`;

                    renderList(data);

                    searchInput.disabled = false;
                    loadBtn.innerHTML = '<i class="fas fa-check"></i> Loaded';
                    loadBtn.classList.add('opacity-50', 'cursor-not-allowed');

                    log(`Successfully loaded ${data.length} records in ${duration}ms.`, "SUCCESS");

                } catch (e) {
                    console.error(e);
                    log(`Load Failed: ${e.message}`, "ERROR");
                    loadBtn.disabled = false;
                    loadBtn.innerText = "Retry Load";
                }
            });

            // Search
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                if(query.length < 3) {
                    if(query.length === 0) renderList(currentData);
                    return;
                }

                if(window.ArtisanalTools) {
                    const results = window.ArtisanalTools.semanticSearch(query, currentData);
                    // Map scores for display
                    // The semanticSearch returns objects, we need to extract scores if possible,
                    // but the current implementation returns just items sorted.
                    // Let's assume just rendering the sorted list is enough.
                    // Wait, I should verify what semanticSearch returns.
                    // It returns `map(r => r.item)`. So we lose the score.
                    // For the UI it would be nice to have the score.
                    // Maybe I should tweak the tool?
                    // No, "purely additive". I can just re-implement a tiny wrapper here if I really want scores,
                    // or just trust the sort order.
                    // Let's just trust the sort order for now to stick to the plan.

                    renderList(results);
                    log(`Search for "${query}" found ${results.length} matches.`, "INFO");
                }
            });
        });
    </script>
    <script src="js/nav.js"></script>
</body>
</html>
