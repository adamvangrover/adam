apiVersion: apps/v1
kind: Deployment
metadata:
  name: adam-sidecar-agents
  labels:
    app: adam-sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adam-sidecar
  template:
    metadata:
      labels:
        app: adam-sidecar
    spec:
      containers:
      - name: sentinel-nexus-agent
        image: adam-swarm:latest
        command: ["python", "core/engine/swarm/entrypoint.py"]
        ports:
        - containerPort: 5001
        env:
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: "/app"
---
apiVersion: v1
kind: Service
metadata:
  name: adam-sidecar-svc
spec:
  selector:
    app: adam-sidecar
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001