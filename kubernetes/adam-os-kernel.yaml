apiVersion: apps/v1
kind: Deployment
metadata:
  name: adam-os-kernel
  labels:
    app: adam-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adam-os
  template:
    metadata:
      labels:
        app: adam-os
    spec:
      containers:
      - name: core-engine
        image: adam-core-engine:latest
        ports:
        - containerPort: 50051
        env:
        - name: RUST_LOG
          value: info
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        - name: data-volume
          mountPath: /var/data
      volumes:
      - name: config-volume
        configMap:
          name: adam-config
      - name: data-volume
        persistentVolumeClaim:
          claimName: adam-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: adam-os-kernel-svc
spec:
  selector:
    app: adam-os
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adam-os-ingress
spec:
  rules:
  - host: adam.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: adam-os-kernel-svc
            port:
              number: 50051
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adam-config
data:
  config.yaml: |
    engine:
      mode: production
      log_level: info
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adam-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
