name: Daily Protocol ARCHITECT_INFINITE

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  daily-ritual:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install pytest pytest-cov mkdocs

      - name: Run Daily Ritual
        run: |
          export PYTHONPATH=.
          python ops/daily_ritual.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Tests with Coverage
        run: |
          export PYTHONPATH=.
          python -m pytest --cov=src --cov-fail-under=80

      - name: Build Docs
        run: |
          mkdocs build

      - name: Run Provenance check
        run: |
          python ops/checks/check_provenance.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "feat(jules): Daily Recursive Cycle Expansion"
          branch: "jules/daily-build"
          commit-message: "feat(jules): automated daily protocol execution"
          body: |
            Automated daily Protocol ARCHITECT_INFINITE run.
            - Code generated successfully.
            - Pytest coverage > 80%
            - ProvenanceHeader validator passed.
