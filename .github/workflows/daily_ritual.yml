name: Daily Ritual & Flywheel Evaluation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  daily_ritual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install uv && uv sync
      - name: MCP Ingestion & Knowledge Base Update
        run: uv run python scripts/run_daily_ingestion.py || true
      - name: Fortress & Hunt Sentinel Assessments
        run: uv run python scripts/generate_sentinel_assessments.py || true
      - name: Market Mayhem Simulations
        run: uv run python scripts/generate_market_mayhem.py || true
      - name: Run Daily Ritual Core
        run: uv run python daily_ritual/daily_ritual.py || true
      - name: Generate Multiformat Human Reports
        run: uv run python scripts/generate_human_reports.py || true
      - name: Run Tests & Coverage
        run: PYTHONPATH=.:src:core:adam_v3 uv run pytest tests/ --cov=src --cov=adam_v3 --cov-fail-under=80
      - name: Run Provenance Check
        run: uv run python ops/checks/check_provenance.py
      - name: Build Docs
        run: uv run mkdocs build || true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: 'Automated Daily Ritual Updates'
          branch: 'daily-ritual'
          commit-message: 'Automated Daily Ritual Updates'
