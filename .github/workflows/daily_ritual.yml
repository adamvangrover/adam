name: Daily Ritual & Flywheel Evaluation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  daily_ritual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install poetry && poetry install
      - name: Run Daily Ritual
        run: poetry run python daily_ritual/daily_ritual.py
      - name: Run Tests & Coverage
        run: poetry run pytest tests/ --cov=src --cov=adam_v3 --cov-fail-under=80
      - name: Run Provenance Check
        run: poetry run python ops/checks/check_provenance.py
      - name: Build Docs
        run: poetry run mkdocs build
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: 'Automated Daily Ritual Updates'
          branch: 'daily-ritual'
          commit-message: 'Automated Daily Ritual Updates'
