name: CI / Python Unit
on:
  push:
    paths-ignore:
      - 'core/experimental/adamos_kernel/'
      - 'docs/'
  pull_request:
    paths-ignore:
      - 'core/experimental/adamos_kernel/'
      - 'docs/'
jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov flake8
          if [ -f requirements/base.txt ]; then pip install -r requirements/base.txt; fi
          pip install -e .
      - name: Run Unit Tests
        env:
          PYTHONPATH: .
        run: |
          pytest -m "not integration" --ignore=tests/test_v23_5_pipeline.py